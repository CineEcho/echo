name: Fetch Movie Data

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 00:00 UTC 执行一次任务
  push:
    branches:
      - main

jobs:
  fetch-movie-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'

      - name: Install dependencies
        run: |
          npm install axios
          npm install dotenv  # 安装 dotenv 模块

      - name: Run the movie fetch script
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}  # 使用 GitHub Secrets 中的 API 密钥
        run: |
          node scripts/fetch-movies.js

      - name: Commit and push the updated movie data
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/CineEcho/echo.git  # 使用 PAT 进行身份验证
          git add data/movies.json
          git commit -m "Update movie data"
          git push
